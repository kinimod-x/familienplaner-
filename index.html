<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Familienplaner – Dominik</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh;}

#app{max-width:900px;margin:0 auto;padding:16px 16px 80px;}

.topbar{background:white;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #eee;border-radius:12px;margin-bottom:16px;}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-title{font-size:16px;font-weight:600;}
.sync-btn{background:#667eea;color:white;border:none;border-radius:6px;padding:6px 10px;cursor:pointer;font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px;}
.sync-btn:hover{background:#5a6fd6;}
.sync-btn.syncing{animation:spin 1s linear infinite;}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.search-field{flex:1;margin:0 16px;}
.search-input{width:100%;padding:8px 12px;border:1.5px solid #ddd;border-radius:6px;font-size:13px;}
.search-input:focus{outline:none;border-color:#667eea;}

.view-tabs{display:flex;gap:8px;margin-bottom:20px;}
.tab-btn{padding:8px 14px;border:1.5px solid #ddd;background:white;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:all 0.15s;}
.tab-btn.active{background:#667eea;color:white;border-color:#667eea;}

.week-container{background:white;border-radius:12px;padding:20px;border:1px solid #f0f0f0;display:grid;grid-template-columns:1fr 1fr;gap:20px;min-height:500px;}

.current-day{display:flex;flex-direction:column;border-right:2px solid #f0f0f0;padding-right:20px;}

.time-display{font-size:32px;font-weight:700;margin-bottom:4px;font-family:'Courier New',monospace;padding:8px 12px;border-radius:8px;width:fit-content;background:linear-gradient(135deg,#FDB022 0%,#FF9D00 100%);color:white;}
.time-label{font-size:11px;color:#999;font-weight:600;margin-bottom:16px;}
.weather-box{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border-radius:8px;padding:12px;margin-bottom:16px;font-size:13px;text-align:center;}
.weather-emoji{font-size:32px;animation:float 3s ease-in-out infinite;display:block;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.weather-temp{font-size:18px;font-weight:600;margin:4px 0;}

.current-day-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.current-day-title{font-size:14px;color:#999;font-weight:600;}
.today-btn{background:#667eea;color:white;border:none;border-radius:6px;padding:6px 10px;cursor:pointer;font-size:11px;font-weight:600;}
.today-btn:hover{background:#5a6fd6;}
.current-day-date{font-size:20px;font-weight:600;margin-bottom:16px;}
.current-events{flex:1;}
.events-label{font-size:12px;color:#999;font-weight:600;margin-bottom:8px;}
.event-card{background:#f8f8ff;border-left:3px solid #667eea;border-radius:4px;padding:10px 12px;margin-bottom:8px;}
.event-emoji{font-size:16px;margin-right:6px;}
.event-title{font-size:13px;font-weight:500;display:inline;}
.event-time{font-size:11px;color:#999;display:block;margin-top:3px;}
.add-event-btn{width:100%;padding:8px;border:1.5px dashed #ddd;background:transparent;border-radius:6px;cursor:pointer;font-size:12px;color:#667eea;font-weight:500;margin-top:12px;}
.add-event-btn:hover{background:#f0f0ff;border-color:#667eea;}

.week-days{display:flex;flex-direction:column;gap:8px;}
.week-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.week-nav-btn{background:transparent;border:1px solid #ddd;border-radius:6px;padding:6px 12px;cursor:pointer;font-size:12px;}
.week-nav-btn:hover{background:#f8f8f8;}
.week-title{font-size:13px;font-weight:600;}

.day-card{background:white;border:1px solid #f0f0f0;border-radius:8px;padding:12px;display:flex;gap:12px;cursor:pointer;transition:all 0.15s;min-height:100px;}
.day-card:hover{background:#f8f8ff;border-color:#c0b8f0;}
.day-card.weekend{background:#f5f5f5;}
.day-card.selected{background:#e8e0f6;border:2px solid #667eea;}

.day-card-num{font-size:20px;font-weight:700;color:#333;min-width:40px;text-align:center;line-height:1;}
.day-card-name{font-size:10px;color:#999;font-weight:600;margin-top:2px;}

.day-card-shift{background:#ffd700;color:#333;border-radius:4px;padding:8px;min-width:45px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0;}
.day-card-shift.spat{background:#a855f7;color:white;}
.day-card-shift.none{background:#e0e0e0;color:#999;font-size:12px;}

.day-card-events{flex:1;display:flex;flex-direction:column;gap:4px;overflow-y:auto;}
.day-card-event{background:#fafafa;padding:6px 10px;border-radius:4px;font-size:11px;border-left:2px solid #667eea;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.day-card-event-emoji{font-size:12px;margin-right:4px;}

.month-container{background:white;border-radius:12px;padding:20px;border:1px solid #f0f0f0;}
.month-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.month-nav-btn{background:transparent;border:1px solid #ddd;border-radius:6px;padding:6px 12px;cursor:pointer;font-size:12px;}
.month-title{font-size:18px;font-weight:600;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:20px;}
.cal-day-name{text-align:center;font-size:11px;color:#999;padding:8px 0;font-weight:600;}
.cal-day{min-height:120px;border:1px solid #f0f0f0;border-radius:6px;padding:8px;background:white;cursor:pointer;transition:all 0.1s;display:flex;flex-direction:column;}
.cal-day.weekend{background:#f5f5f5;}
.cal-day:hover{background:#f8f8ff;border-color:#c0b8f0;}
.cal-day.today{border:2px solid #667eea;background:#f0f0ff;}
.cal-day.other-month{opacity:0.3;}
.cal-day-num{font-size:12px;font-weight:600;margin-bottom:6px;}
.cal-day-shift-bar{height:6px;border-radius:2px;margin-bottom:6px;}
.cal-day-events{display:flex;flex-direction:column;gap:2px;flex:1;overflow:hidden;}
.cal-event-item{font-size:9px;padding:2px 4px;border-radius:2px;background:#f0f0f0;border-left:2px solid #667eea;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}

.year-container{background:white;border-radius:12px;padding:20px;border:1px solid #f0f0f0;}
.year-header{text-align:center;margin-bottom:20px;}
.year-title{font-size:20px;font-weight:600;margin-bottom:4px;}
.months-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.month-card{background:#fafafa;border:1px solid #f0f0f0;border-radius:8px;padding:12px;}
.month-card-title{font-size:13px;font-weight:600;margin-bottom:8px;}
.mini-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.mini-day{width:100%;aspect-ratio:1;border:0.5px solid #e0e0e0;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;background:white;}
.mini-day.has-event{background:#e8e0f6;color:#667eea;font-weight:600;}
.mini-day.weekend{background:#f0f0f0;}

.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:900px;background:white;border-top:1px solid #eee;display:flex;z-index:50;border-radius:16px 16px 0 0;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;cursor:pointer;border:none;background:transparent;color:#999;font-size:10px;gap:3px;transition:color 0.15s;}
.nav-item.active{color:#667eea;}
.nav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:white;border-radius:12px;padding:20px;width:90%;max-width:360px;}
.modal-title{font-size:16px;font-weight:600;margin-bottom:16px;}
.form-group{margin-bottom:12px;}
.form-label{font-size:12px;color:#666;margin-bottom:4px;display:block;font-weight:500;}
.form-input{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;}
.form-input:focus{outline:none;border-color:#667eea;}
.color-picker{display:flex;gap:6px;margin-top:6px;}
.color-opt{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
.color-opt.selected{border-color:#333;}
.modal-btns{display:flex;gap:8px;margin-top:16px;}
.btn-primary{flex:1;background:#667eea;color:white;border:none;border-radius:6px;padding:8px;cursor:pointer;font-weight:600;font-size:13px;}
.btn-cancel{flex:1;background:transparent;border:1px solid #ddd;border-radius:6px;padding:8px;cursor:pointer;font-size:13px;}

.status{padding:8px 12px;background:#e3f2fd;color:#1976d2;border-radius:6px;font-size:12px;margin-bottom:12px;display:none;}
.status.show{display:block;}
</style>
</head>
<body>

<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-title">📅 Familienplaner</span>
      <button class="sync-btn" onclick="syncCalendar()">🔄 Sync</button>
    </div>
    <input type="text" class="search-input" id="search-input" placeholder="🔍 Termine durchsuchen..." onkeyup="searchEvents()">
  </div>

  <div class="status" id="status"></div>

  <div class="view-tabs">
    <button class="tab-btn active" onclick="showView('week')">📊 Woche</button>
    <button class="tab-btn" onclick="showView('month')">📅 Monat</button>
    <button class="tab-btn" onclick="showView('year')">📆 Jahr</button>
  </div>

  <!-- WEEK VIEW -->
  <div id="view-week" class="week-container">
    <div class="current-day">
      <div class="time-display" id="current-time">--:--</div>
      <div class="time-label">UHRZEIT</div>
      <div class="weather-box">
        <span class="weather-emoji">☀️</span>
        <div class="weather-temp">22°C</div>
        <div style="font-size:11px;opacity:0.9;">Sonnig</div>
      </div>
      <div class="current-day-header">
        <span class="current-day-title">AKTUELLER TAG</span>
        <button class="today-btn" onclick="goToToday()">Heute</button>
      </div>
      <div class="current-day-date" id="current-date">Montag</div>
      <div class="current-events">
        <div class="events-label">TERMINE</div>
        <div id="current-events-list"></div>
      </div>
      <button class="add-event-btn" onclick="openEventForm()">+ Termin hinzufügen</button>
    </div>

    <div>
      <div class="week-nav">
        <button class="week-nav-btn" onclick="prevWeek()">◀ Vorher</button>
        <div class="week-title">Woche</div>
        <button class="week-nav-btn" onclick="nextWeek()">Nachher ▶</button>
      </div>
      <div class="week-days" id="week-days"></div>
    </div>
  </div>

  <!-- MONTH VIEW -->
  <div id="view-month" style="display:none;" class="month-container">
    <div class="month-header">
      <button class="month-nav-btn" onclick="prevMonth()">◀ Vorher</button>
      <div class="month-title" id="month-label">Juni 2026</div>
      <button class="month-nav-btn" onclick="nextMonth()">Nachher ▶</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <!-- YEAR VIEW -->
  <div id="view-year" style="display:none;" class="year-container">
    <div class="year-header">
      <div class="year-title" id="year-label">2026</div>
    </div>
    <div class="months-grid" id="months-grid"></div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item active" onclick="showSection('week',this)"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg>Woche</button>
    <button class="nav-item" onclick="showSection('month',this)"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg>Monat</button>
    <button class="nav-item" onclick="showSection('year',this)"><svg viewBox="0 0 24 24"><path d="M12 2L2 7v10c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-10-5z"/></svg>Jahr</button>
    <button class="nav-item" onclick="showSection('tasks',this)"><svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/></svg>Aufgaben</button>
    <button class="nav-item" onclick="showSection('shop',this)"><svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 001.98-1.71l1.62-9.29H6"/></svg>Einkauf</button>
  </nav>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">Neuer Termin</div>
    <div class="form-group">
      <label class="form-label">Emoji</label>
      <input type="text" class="form-input" id="emoji-input" value="📅" maxlength="2" style="width:50px;">
    </div>
    <div class="form-group">
      <label class="form-label">Titel</label>
      <input type="text" class="form-input" id="event-title" placeholder="z.B. Zahnarzt">
    </div>
    <div class="form-group">
      <label class="form-label">Datum</label>
      <input type="date" class="form-input" id="event-date">
    </div>
    <div class="form-group">
      <label class="form-label">Zeit</label>
      <input type="time" class="form-input" id="event-time">
    </div>
    <div class="form-group">
      <label class="form-label">Schicht</label>
      <select class="form-input" id="shift-select">
        <option value="">—</option>
        <option value="F">Frühschicht (F)</option>
        <option value="S">Spätschicht (S)</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Farbe</label>
      <div class="color-picker" id="color-picker"></div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
      <button class="btn-primary" onclick="saveEvent()">Speichern</button>
    </div>
  </div>
</div>

<script>
const colors = [
  {hex:'#667eea'}, {hex:'#22c55e'}, {hex:'#ef4444'},
  {hex:'#f97316'}, {hex:'#ec4899'}, {hex:'#a855f7'},
];

let events = [
  {date:'2026-07-01',emoji:'🏥',title:'Zahnarzt',time:'09:00',color:'#667eea',shift:''},
  {date:'2026-07-01',emoji:'🎭',title:'Ballett',time:'12:30',color:'#f97316',shift:'S'},
  {date:'2026-07-02',emoji:'🍕',title:'Pizza-Essen',time:'19:00',color:'#ec4899',shift:''},
  {date:'2026-07-03',emoji:'⚽',title:'Fußballtraining',time:'16:00',color:'#ef4444',shift:'F'},
  {date:'2026-07-04',emoji:'📚',title:'Lesegruppe',time:'18:00',color:'#22c55e',shift:''},
];

const DAYS=['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
const DAY_SHORT=['So','Mo','Di','Mi','Do','Fr','Sa'];
const MONTHS=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

let selectedColor = colors[0].hex;
let weekStartDate = new Date();
weekStartDate.setDate(weekStartDate.getDate() - weekStartDate.getDay() + 1);
let selectedDate = weekStartDate.toISOString().slice(0,10);
let currentMonth = new Date();
let currentYear = new Date().getFullYear();

function isWeekend(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.getDay() === 0 || d.getDay() === 6;
}

function updateTime() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('current-time').textContent = `${h}:${m}`;
}

function searchEvents() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const results = q ? events.filter(e => e.title.toLowerCase().includes(q)) : [];
  console.log('Search:', q, results);
}

function renderWeek() {
  const fd = d => d.toISOString().slice(0,10);
  const cd = new Date(selectedDate + 'T00:00:00');
  const dn = DAYS[cd.getDay()];
  const dm = cd.getDate();
  const mn = MONTHS[cd.getMonth()];
  document.getElementById('current-date').textContent = `${dn}, ${dm}. ${mn}`;
  
  const te = events.filter(e => e.date === selectedDate);
  document.getElementById('current-events-list').innerHTML = te.length ? te.map(e => `<div class="event-card" style="border-left-color:${e.color};"><span class="event-emoji">${e.emoji}</span><span class="event-title">${e.title}</span><div class="event-time">${e.time}</div></div>`).join('') : '<div style="color:#ccc;font-size:12px;padding:8px;">Keine Termine</div>';
  
  let wh = '';
  for (let i=0; i<7; i++) {
    const d = new Date(weekStartDate);
    d.setDate(d.getDate() + i);
    const ds = fd(d);
    const dsn = DAY_SHORT[d.getDay()];
    const de = events.filter(e => e.date === ds);
    const sel = ds === selectedDate ? ' selected' : '';
    const wknd = isWeekend(ds) ? ' weekend' : '';
    
    let shiftBar = '—';
    const shiftEvent = de.find(e => e.shift);
    if (shiftEvent) shiftBar = shiftEvent.shift;
    
    wh += `<div class="day-card${sel}${wknd}" onclick="selectDay('${ds}')">
      <div>
        <div class="day-card-num">${d.getDate()}</div>
        <div class="day-card-name">${dsn}</div>
      </div>
      <div class="day-card-shift${shiftBar==='S'?' spat':''}${shiftBar==='—'?' none':''}">${shiftBar}</div>
      <div class="day-card-events">
        ${de.filter(e => !e.shift).map(e => `<div class="day-card-event"><span class="day-card-event-emoji">${e.emoji}</span>${e.time} ${e.title}</div>`).join('')}
      </div>
    </div>`;
  }
  document.getElementById('week-days').innerHTML = wh;
}

function renderMonth() {
  const year = currentMonth.getFullYear();
  const month = currentMonth.getMonth();
  document.getElementById('month-label').textContent = MONTHS[month] + ' ' + year;
  
  const firstDay = (new Date(year, month, 1).getDay() + 6) % 7;
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = new Date().toISOString().slice(0,10);
  
  let html = DAYS.map(d => `<div class="cal-day-name">${d.slice(0,2)}</div>`).join('');
  for (let i = firstDay - 1; i >= 0; i--) html += '<div class="cal-day other-month"></div>';
  
  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const dayEvents = events.filter(e => e.date === dateStr);
    const isToday = dateStr === today;
    const wknd = isWeekend(dateStr) ? ' weekend' : '';
    
    let shiftColor = '';
    const shiftEvent = dayEvents.find(e => e.shift);
    if (shiftEvent) shiftColor = shiftEvent.shift === 'F' ? '#ffd700' : '#a855f7';
    
    html += `<div class="cal-day${isToday ? ' today' : ''}${wknd}">
      <div class="cal-day-num">${day}</div>
      ${shiftColor ? `<div class="cal-day-shift-bar" style="background:${shiftColor};"></div>` : ''}
      <div class="cal-day-events">
        ${dayEvents.filter(e => !e.shift).map(e => `<div class="cal-event-item">${e.emoji}</div>`).join('')}
      </div>
    </div>`;
  }
  document.getElementById('cal-grid').innerHTML = html;
}

function renderYear() {
  document.getElementById('year-label').textContent = currentYear;
  let html = '';
  for (let m = 0; m < 12; m++) {
    const monthStr = `${currentYear}-${String(m+1).padStart(2,'0')}`;
    const monthEvents = events.filter(e => e.date.startsWith(monthStr));
    html += `<div class="month-card"><div class="month-card-title">${MONTHS[m].slice(0,3)}</div><div class="mini-cal">`;
    const firstDay = (new Date(currentYear, m, 1).getDay() + 6) % 7;
    const daysInMonth = new Date(currentYear, m + 1, 0).getDate();
    for (let i = 0; i < firstDay; i++) html += '<div class="mini-day"></div>';
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${currentYear}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const hasEvent = monthEvents.some(e => e.date === dateStr);
      const wknd = isWeekend(dateStr) ? ' weekend' : '';
      html += `<div class="mini-day${hasEvent ? ' has-event' : ''}${wknd}">${d}</div>`;
    }
    html += '</div></div>';
  }
  document.getElementById('months-grid').innerHTML = html;
}

function selectDay(d) {
  selectedDate = d;
  const date = new Date(d + 'T00:00:00');
  weekStartDate = new Date(date);
  weekStartDate.setDate(weekStartDate.getDate() - weekStartDate.getDay() + 1);
  renderWeek();
}

function prevWeek() { weekStartDate.setDate(weekStartDate.getDate() - 7); renderWeek(); }
function nextWeek() { weekStartDate.setDate(weekStartDate.getDate() + 7); renderWeek(); }
function prevMonth() { currentMonth.setMonth(currentMonth.getMonth() - 1); renderMonth(); }
function nextMonth() { currentMonth.setMonth(currentMonth.getMonth() + 1); renderMonth(); }

function goToToday() {
  const today = new Date();
  selectedDate = today.toISOString().slice(0,10);
  weekStartDate = new Date(today);
  weekStartDate.setDate(weekStartDate.getDate() - weekStartDate.getDay() + 1);
  renderWeek();
}

function showView(name) {
  document.querySelectorAll('[id^="view-"]').forEach(v => v.style.display = 'none');
  document.getElementById('view-' + name).style.display = 'block';
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', (i === 0 && name === 'week') || (i === 1 && name === 'month') || (i === 2 && name === 'year'));
  });
}

function showSection(name, btn) {
  showView(name);
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

function openEventForm() {
  document.getElementById('event-date').value = selectedDate;
  document.getElementById('event-time').value = '10:00';
  document.getElementById('event-title').value = '';
  document.getElementById('emoji-input').value = '📅';
  document.getElementById('shift-select').value = '';
  let ch = colors.map((c,i) => `<div class="color-opt${i===0?' selected':''}" style="background:${c.hex};" onclick="selectColor('${c.hex}',this)"></div>`).join('');
  document.getElementById('color-picker').innerHTML = ch;
  selectedColor = colors[0].hex;
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

function selectColor(h, el) {
  document.querySelectorAll('.color-opt').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedColor = h;
}

function saveEvent() {
  const title = document.getElementById('event-title').value.trim();
  const date = document.getElementById('event-date').value;
  const time = document.getElementById('event-time').value;
  const emoji = document.getElementById('emoji-input').value || '📅';
  const shift = document.getElementById('shift-select').value;
  if (!title || !date) { alert('Titel und Datum erforderlich'); return; }
  events.push({date, emoji, title, time, color:selectedColor, shift:shift||''});
  closeModal();
  selectedDate = date;
  weekStartDate = new Date(date + 'T00:00:00');
  weekStartDate.setDate(weekStartDate.getDate() - weekStartDate.getDay() + 1);
  renderWeek();
  renderMonth();
  renderYear();
}

function syncCalendar() {
  const btn = document.querySelector('.sync-btn');
  btn.classList.add('syncing');
  setTimeout(() => {
    btn.classList.remove('syncing');
    showStatus('✓ Kalender aktualisiert');
  }, 2000);
}

function showStatus(msg) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

updateTime();
setInterval(updateTime, 60000);
renderWeek();
renderMonth();
renderYear();
</script>
</body>
</html>
